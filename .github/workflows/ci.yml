name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      POSTPLAN_PUBLISH_TOKEN: ${{ secrets.POSTPLAN_PUBLISH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Mask Convex deployment URLs
        shell: bash
        run: |
          if [ -n "${NEXT_PUBLIC_CONVEX_URL:-}" ]; then
            echo "::add-mask::$NEXT_PUBLIC_CONVEX_URL"
            echo "::add-mask::${NEXT_PUBLIC_CONVEX_URL/.convex.cloud/.convex.site}"
            echo "::add-mask::${NEXT_PUBLIC_CONVEX_URL/.convex.site/.convex.cloud}"
          fi

      - name: Build
        run: npm run build

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      POSTPLAN_PUBLISH_TOKEN: ${{ secrets.POSTPLAN_PUBLISH_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment secrets
        shell: bash
        run: |
          missing=0
          for name in CONVEX_DEPLOY_KEY NEXT_PUBLIC_CONVEX_URL POSTPLAN_PUBLISH_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set"
              missing=1
            fi
          done
          exit "$missing"

      - name: Mask Convex deployment URLs
        shell: bash
        run: |
          if [ -n "${NEXT_PUBLIC_CONVEX_URL:-}" ]; then
            echo "::add-mask::$NEXT_PUBLIC_CONVEX_URL"
            echo "::add-mask::${NEXT_PUBLIC_CONVEX_URL/.convex.cloud/.convex.site}"
            echo "::add-mask::${NEXT_PUBLIC_CONVEX_URL/.convex.site/.convex.cloud}"
          fi

      - name: Deploy Convex
        shell: bash
        run: |
          set -o pipefail
          npx convex deploy 2>&1 | sed -E \
            -e 's#https://[A-Za-z0-9.-]+\.convex\.cloud#[redacted convex url]#g' \
            -e 's#https://[A-Za-z0-9.-]+\.convex\.site#[redacted convex url]#g'

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build Vercel output
        run: npx vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy Vercel
        run: npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
